<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Implementation of El Niño Based District Contingent Plan for Kharif 2026</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- ========================= -->
    <!-- Header -->
    <!-- ========================= -->

    <header>

        <div class="logo-left">
            <img src="images/icar.png" alt="ICAR Logo">
        </div>

        <div class="title">

            <h1>
                Implementation of El Niño Based District Contingent Plan
            </h1>

            <h2>
                Kharif 2026
            </h2>

            <p>
                ICAR Research Complex for NEH Region, Umiam, Meghalaya
            </p>

        </div>

        <div class="logo-right">
            <img src="images/india.png" alt="India Logo">
        </div>

    </header>

    <!-- ========================= -->
    <!-- Selection Panel -->
    <!-- ========================= -->

    <section class="selection-panel">

        <div class="input-group">

            <label>Select State</label>

            <select id="state">
                <option value="">Select State</option>
            </select>

        </div>

        <div class="input-group">

            <label>Select District</label>

            <select id="district">

                <option value="">Select District</option>

            </select>

        </div>

    </section>


    <!-- ========================= -->
    <!-- Information Panel -->
    <!-- ========================= -->

    <section class="message-card">

        <div class="card-header">

            District Advisory / Information

        </div>

        <div id="message" class="message">

            Please select State and District.

        </div>

    </section>


    <!-- ========================= -->
    <!-- Footer -->
    <!-- ========================= -->

    <footer>

        © 2026 ICAR Research Complex for NEH Region |
        El Niño Contingent Planning Dashboard

    </footer>


</div>

<script src="script.js"></script>

</body>
</html>
